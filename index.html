<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Income Tax Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Income Tax Calculator</h2>

    <h3>Income</h3>

    <label>Salary Income</label>
    <input type="number" id="salary" placeholder="Enter salary" min="0">

    <label>Other Income</label>
    <input type="number" id="otherIncome" placeholder="Interest, freelance, etc." min="0">

    <label>Interest Income</label>
    <input type="number" id="interestIncome" placeholder="Bank interest" min="0">

    <label>Rental Income</label>
    <input type="number" id="rentalIncome" placeholder="House rent income" min="0">

    <h3>Deductions</h3>

    <label>80C Deduction</label>
    <input type="number" id="deduction80C" placeholder="Max ₹1,50,000" min="0">

    <label>80D Deduction</label>
    <input type="number" id="deduction80D" placeholder="Medical insurance" min="0">

    <label>80G Deduction</label>
    <input type="number" id="deduction80G" placeholder="Donations" min="0">

    <button onclick="calculateTax()">Calculate Tax</button>

    <div id="result"></div>

    <p class="note">
        *This is a simplified tax calculator based on slab system
    </p>
</div>

<script src="script.js"></script>
</body>
</html>
